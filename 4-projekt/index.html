<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Text Storage App</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
      <h1 class="text-2xl font-bold mb-6">Speichere deine Notiz:</h1>
      <form class="space-y-4" action="/save" method="post">
        <div>
          <label for="title" class="block text-sm font-medium text-gray-700"
            >Titel der Notiz:</label
          >
          <input
            type="text"
            id="title"
            name="title"
            required
            class="mt-1 p-2 w-full border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>
        <div>
          <label for="text" class="block text-sm font-medium text-gray-700"
            >Inhalt der Notiz:</label
          >
          <textarea
            id="text"
            name="text"
            required
            rows="4"
            class="mt-1 p-2 w-full border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500"
          ></textarea>
        </div>
        <button
          type="submit"
          class="w-full py-2 px-4 bg-indigo-600 text-white font-medium rounded-md shadow-sm hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >
          Speichern
        </button>
      </form>
    </div>
  </body>
</html>
